apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: cron-test
spec:
  schedule: "* * * * *"
  workflowSpec:
    entrypoint: main
    templates:
      - name: main
        container:
          image: busybox:1.36
      - name: report
        script:
          image: python:3.12
          command: [python]
          source: |
            print("cron report")
