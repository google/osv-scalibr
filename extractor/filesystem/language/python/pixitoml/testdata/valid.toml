[project]
name = "my_project"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64"]

[dependencies]
python = ">=3.9"
numpy = ">=1.24"

[pypi-dependencies]
requests = ">=2.26.0"
flask = "*"

[feature.test.dependencies]
pytest = ">=8"

[feature.docs.pypi-dependencies]
sphinx = ">=7"

[target.linux-64.dependencies]
openssl = { version = ">=3" }

[target.osx-64.pypi-dependencies]
pyobjc = ">=10"
